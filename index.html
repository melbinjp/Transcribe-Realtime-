<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Transcription</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.svg">

</head>
<body>
  <div class="container">
    <div class="top-panel">
      <header>
        <h1>Real-Time Transcription</h1>
        <p>Transcribe audio in real-time with timestamps.</p>
      </header>

      <!-- Controls Section -->
      <div class="controls">
        <button id="start-btn" class="button">Start Transcription</button>
        <button id="stop-btn" class="button" disabled>Stop Transcription</button>
        <select id="language-select" class="dropdown">
          <option value="en-GB" selected>English (UK)</option>
          <option value="ml-IN">Malayalam</option>
          <option value="hi-IN">Hindi</option>
        </select>
        <button id="download-btn" class="button" disabled>Download SRT</button>
      </div>
    </div>

    <!-- Transcription Box -->
    <div class="transcription-container">
      <textarea id="transcription" placeholder="Transcribed text will appear here..." readonly></textarea>
    </div>

    <!-- Footer -->
    <footer>
      <p>&copy; 2024 Real-Time Transcription Tool</p>
    </footer>
  </div>

  <script src="script.js"></script>

    <footer role="contentinfo" style="margin-top: 2rem; padding: 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: #888;">
    <p>&copy; <span class="copyright-year"></span> WeCanUseAI. Empowering creativity with AI.</p>
    <div style="margin-top: 0.5rem; display: flex; justify-content: center; gap: 1.5rem;">
      <a href="https://wecanuseai.com/" style="color: inherit; text-decoration: none;">Home</a>
      <a href="https://wecanuseai.com/privacy.html" style="color: inherit; text-decoration: none;">Privacy</a>
      <a href="https://wecanuseai.com/terms.html" style="color: inherit; text-decoration: none;">Terms</a>
      <a href="https://wecanuseai.com/contact.html" style="color: inherit; text-decoration: none;">Contact</a>
    </div>
  </footer>
</body>
</html>
